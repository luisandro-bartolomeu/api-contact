# Server Configuration
server.port=${SERVER_PORT:8080}
spring.application.name=${SPRING_APPLICATION_NAME:api-contacts}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:contactsdb}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA Configuration
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${SPRING_H2_CONSOLE_PATH:/h2-console}

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Observability
management.endpoints.web.base-path=${MANAGEMENT_ENDPOINTS_WEB_BASE_PATH:/actuator}
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:when_authorized}
management.endpoint.health.probes.enabled=${MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED:true}
management.health.defaults.enabled=${MANAGEMENT_HEALTH_DEFAULTS_ENABLED:true}
management.info.env.enabled=${MANAGEMENT_INFO_ENV_ENABLED:true}
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles-histogram.http.client.requests=true
management.tracing.enabled=${MANAGEMENT_TRACING_ENABLED:true}
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
info.app.name=${spring.application.name}
info.app.version=@project.version@
info.app.description=API de Contatos com observabilidade habilitada

# Security
security.basic.enabled=${SECURITY_BASIC_ENABLED:true}
jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-key-1234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}
app.bootstrap-admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME:admin}
app.bootstrap-admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:admin@contactos.local}
app.bootstrap-admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:admin123}
app.bootstrap-admin.full-name=${APP_BOOTSTRAP_ADMIN_FULL_NAME:Default Admin}
app.bootstrap-admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:true}

# Logging
logging.level.com.luisandro.contactos=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [traceId=%X{traceId:-}, spanId=%X{spanId:-}] - %msg%n
